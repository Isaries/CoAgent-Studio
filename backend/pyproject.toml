[tool.black]
line-length = 100
target-version = ["py311"]
skip-string-normalization = false

[tool.ruff]
line-length = 100
exclude = ["migrations", "alembic"]

[tool.ruff.lint]
select = ["E", "F", "W", "C90", "I", "N", "UP", "B", "A", "C4", "ISC", "PIE", "PT", "RUF"]
ignore = [
    "E501",   # line too long (handled by black)
    "B008",   # function call in default argument (FastAPI Depends)
    "E711",   # comparison to None
    "C901",   # too complex
    "A002",   # argument shadowing builtin (id, type, etc — common in FastAPI)
    "RUF001", # ambiguous unicode character in string
    "RUF002", # ambiguous unicode character in docstring
    "RUF003", # ambiguous unicode character in comment
    "RUF012", # mutable class attributes (SQLModel pattern)
    "RUF006", # asyncio.create_task without reference
    "E402",   # module level import not at top (conditional imports)
]

[tool.mypy]
python_version = "3.12"
plugins = ["pydantic.mypy"]
exclude = ["alembic", "migrations", "tests"]
strict_optional = true
explicit_package_bases = true

[[tool.mypy.overrides]]
module = "tests.*"
ignore_errors = true
disallow_untyped_defs = false

[[tool.mypy.overrides]]
module = "app.*"
disallow_untyped_defs = false

[[tool.mypy.overrides]]
module = ["google.generativeai.*", "google.genai.*", "google.ai.generativelanguage.*"]
ignore_missing_imports = true
